<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angel Text Voice - 8-bit Sound Generator</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { background: linear-gradient(135deg, #fce4ec 0%, #e1f5fe 100%); color: #5d4037; font-family: "Malgun Gothic", sans-serif; min-height: 100vh; margin: 0; }
        .font-retro { font-family: 'Press Start 2P', cursive; }
        .pixel-border { background-color: rgba(255, 255, 255, 0.8); border: 4px solid #b3e5fc; box-shadow: 4px 4px 0px #f8bbd0; border-radius: 12px; }
        .cursor { display: inline-block; width: 12px; height: 18px; background: #f06292; animation: blink 0.8s infinite; vertical-align: middle; margin-left: 4px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        input[type="range"] { accent-color: #f06292; }
        .btn-pastel { transition: all 0.2s; box-shadow: 2px 2px 0px #888; }
        .btn-pastel:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #888; }
        .num-input { background: #fff; border: 2px solid #f8bbd0; border-radius: 6px; width: 70px; text-align: center; color: #f06292; font-weight: bold; outline: none; }
        .wing-img { width: 60px; height: auto; filter: drop-shadow(2px 2px 0px rgba(255, 255, 255, 0.8)); user-select: none; pointer-events: none; }
        .wing-left-anim { animation: floatLeft 3s ease-in-out infinite; }
        .wing-right-anim { animation: floatRight 3s ease-in-out infinite; }
        @keyframes floatLeft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes floatRight { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 relative" oncontextmenu="return false;">
    <div class="absolute top-6 right-6">
        <select id="lang-select" class="bg-white/80 border border-pink-200 p-2 rounded-lg text-xs outline-none cursor-pointer">
            <option value="ko">한국어 (KO)</option>
            <option value="en">English (EN)</option>
            <option value="jp">日本語 (JP)</option>
            <option value="cn">简体中文 (CN)</option>
        </select>
    </div>

    <div class="max-w-3xl w-full space-y-8 z-10 mt-12">
        <header class="flex flex-col items-center">
            <div class="flex items-center justify-center gap-4 mb-2">
                <img src="wing_left.png" class="wing-img wing-left-anim" alt="Wing Left">
                <h1 id="main-title" class="text-xl md:text-2xl text-pink-400 drop-shadow-sm font-retro text-center">ANGEL TEXT VOICE</h1>
                <img src="wing_right.png" class="wing-img wing-right-anim" alt="Wing Right">
            </div>
            <p id="sub-title" class="text-[10px] text-blue-400 uppercase tracking-widest font-bold text-center"></p>
        </header>

        <div class="pixel-border p-8 min-h-[180px] relative bg-white/60 backdrop-blur-sm">
            <div id="display-container" class="text-sm leading-relaxed break-words text-pink-600 font-bold">
                <span id="display-text"></span><span id="cursor" class="cursor"></span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white/40 p-6 rounded-2xl text-xs border border-white/50">
            <div class="space-y-4">
                <label class="block">
                    <div class="flex justify-between items-center mb-1">
                        <span id="label-speed" class="text-blue-500 font-bold">타이핑 속도</span>
                        <div class="flex items-center gap-1">
                            <input type="number" id="speed-num" class="num-input text-xs p-1" min="20" max="250">
                            <span class="text-pink-400 font-bold">ms</span>
                        </div>
                    </div>
                    <input type="range" id="speed" min="20" max="250" value="80" class="w-full">
                </label>
                <label class="block">
                    <div class="flex justify-between items-center mb-1">
                        <span id="label-pitch" class="text-blue-500 font-bold">음 높이 (피치)</span>
                        <div class="flex items-center gap-1">
                            <input type="number" id="pitch-num" class="num-input text-xs p-1" min="50" max="2000">
                            <span class="text-pink-400 font-bold">Hz</span>
                        </div>
                    </div>
                    <input type="range" id="pitch" min="50" max="2000" value="600" class="w-full">
                </label>
            </div>
            <div class="space-y-4">
                <label class="block">
                    <span id="label-tone" class="text-blue-500 font-bold">음색 선택</span>
                    <select id="waveform" class="w-full mt-2 bg-white/80 p-2 rounded border border-pink-200 outline-none font-bold">
                        <optgroup label="Classic Sounds">
                            <option value="triangle">Soft Triangle</option>
                            <option value="sine">Pure Sine</option>
                            <option value="square">Retro Square</option>
                            <option value="sawtooth">Sharp Sawtooth</option>
                        </optgroup>
                        <optgroup label="Heavy & Low">
                            <option value="deep_bass">Deep Bass</option>
                            <option value="power_saw">Power Saw</option>
                            <option value="low_rumble">Low Rumble</option>
                        </optgroup>
                    </select>
                </label>
                <div class="grid grid-cols-2 gap-2 pt-2">
                    <button id="play-btn" class="btn-pastel bg-pink-300 text-white p-3 rounded-lg font-bold uppercase">재생</button>
                    <button id="save-btn" class="btn-pastel bg-blue-300 text-white p-3 rounded-lg font-bold uppercase">저장 (WAV)</button>
                </div>
            </div>
        </div>

        <div class="w-full">
            <textarea id="input-text" class="w-full h-32 p-4 bg-white/80 border-2 border-pink-100 rounded-2xl text-gray-700 focus:border-pink-300 outline-none shadow-inner font-bold"></textarea>
        </div>
        
        <footer class="text-center space-y-3 pb-8">
            <p id="footer-text" class="text-blue-300 text-[10px] font-bold uppercase tracking-wider">* Recorded files are royalty-free! *</p>
            <div class="flex flex-col items-center gap-1">
                <span class="text-gray-400 text-[9px] uppercase tracking-widest">Designed & Developed by</span>
                <a href="https://instagram.com/toramxoxo" target="_blank" class="text-pink-400 text-[12px] font-bold">INSTAGRAM @toramxoxo</a>
            </div>
        </footer>
    </div>

    <script>
        const i18n = {
            ko: { sub: "꿈결 같은 8비트 효과음 생성기", speed: "타이핑 속도", pitch: "음 높이 (피치)", tone: "음색 선택", start: "재생", save: "저장 (WAV)", placeholder: "여기에 대사를 입력하세요...", guide: "저장 버튼을 누르면 경로를 지정하여 WAV 파일로 저장할 수 있습니다." },
            en: { sub: "Dreamy 8-bit sound creator", speed: "Typing Speed", pitch: "Voice Pitch", tone: "Tone Type", start: "Start", save: "Save WAV", placeholder: "Please enter your text here...", guide: "Click SAVE WAV to choose a location and save the audio." },
            jp: { sub: "夢のような8ビット効果音メーカー", speed: "タイ핑速度", pitch: "音の高さ", tone: "音色の種類", start: "再生", save: "保存 (WAV)", placeholder: "ここにテキストを入力してください...", guide: "保存 버튼을 누르면 経路를 指定하여 WAV 파일로 저장할 수 있습니다." },
            cn: { sub: "梦幻8位元声音生成器", speed: "打字速度", pitch: "音高", tone: "音色类型", start: "开始", save: "保存 (WAV)", placeholder: "请在这里输入文字...", guide: "点击保存按钮，选择路径将此对话保存为WAV文件。" }
        };

        let audioCtx = null, isPlaying = false, timeoutId = null, dest = null, mediaRecorder = null, chunks = [];

        const elements = {
            lang: document.getElementById('lang-select'), sub: document.getElementById('sub-title'),
            lSpeed: document.getElementById('label-speed'), lPitch: document.getElementById('label-pitch'),
            lTone: document.getElementById('label-tone'), play: document.getElementById('play-btn'),
            save: document.getElementById('save-btn'), input: document.getElementById('input-text'),
            display: document.getElementById('display-text'), 
            speed: document.getElementById('speed'), speedNum: document.getElementById('speed-num'),
            pitch: document.getElementById('pitch'), pitchNum: document.getElementById('pitch-num'),
            wave: document.getElementById('waveform')
        };

        async function initAudio() { 
            if (!audioCtx) { 
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
                dest = audioCtx.createMediaStreamDestination(); 
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        function playBeep(pitchModifier = 1) {
            const osc = audioCtx.createOscillator(); 
            const gain = audioCtx.createGain();
            let waveType = elements.wave.value;
            let finalPitch = parseInt(elements.pitch.value) * pitchModifier;

            if (waveType === 'deep_bass') { osc.type = 'square'; finalPitch *= 0.5; }
            else if (waveType === 'power_saw') { osc.type = 'sawtooth'; finalPitch *= 0.8; }
            else if (waveType === 'low_rumble') { osc.type = 'triangle'; finalPitch *= 0.4; }
            else { osc.type = waveType; }

            osc.frequency.setValueAtTime(finalPitch + (Math.random()*20-10), audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            
            osc.connect(gain); 
            gain.connect(audioCtx.destination); 
            gain.connect(dest);
            
            osc.start(); 
            osc.stop(audioCtx.currentTime + 0.2);
        }

        async function saveFile(blob) {
            const fileName = `angel_voice_${Date.now()}.wav`;
            if ('showSaveFilePicker' in window) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: fileName,
                        types: [{ description: 'WAV Audio', accept: { 'audio/wav': ['.wav'] } }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    return;
                } catch (err) { if (err.name === 'AbortError') return; }
            }
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fileName; a.click();
        }

        async function typeWriter(text, record = false) {
            await initAudio();
            isPlaying = true; 
            elements.display.textContent = "";
            
            if (record) { 
                chunks = []; 
                mediaRecorder = new MediaRecorder(dest.stream, { mimeType: 'audio/webm;codecs=opus' }); 
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = async () => { await saveFile(new Blob(chunks, { type: 'audio/wav' })); }; 
                mediaRecorder.start(); 
            }

            const chars = Array.from(text);
            for (let i = 0; i < chars.length; i++) {
                if (!isPlaying) break;
                elements.display.textContent += chars[i];
                let delay = parseInt(elements.speed.value);
                if (!/[\s,.?!~~\-…()]/.test(chars[i])) playBeep();
                else if (['.', '?', '!'].includes(chars[i])) delay *= 4;
                await new Promise(r => timeoutId = setTimeout(r, delay));
            }

            if (record) {
                // 마지막 소리가 녹음기에 도달할 수 있게 0.5초 대기
                await new Promise(r => setTimeout(r, 500));
                if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            }
            isPlaying = false;
        }

        function updateLang() {
            const l = i18n[elements.lang.value];
            elements.sub.textContent = l.sub; elements.lSpeed.textContent = l.speed;
            elements.lPitch.textContent = l.pitch; elements.lTone.textContent = l.tone;
            elements.play.textContent = l.start; elements.save.textContent = l.save;
            elements.input.placeholder = l.placeholder;
            if(!isPlaying) elements.display.textContent = l.guide;
        }

        elements.speed.oninput = () => { elements.speedNum.value = elements.speed.value; };
        elements.pitch.oninput = () => { elements.pitchNum.value = elements.pitch.value; };
        elements.speedNum.oninput = () => { elements.speed.value = elements.speedNum.value; };
        elements.pitchNum.oninput = () => { elements.pitch.value = elements.pitchNum.value; };
        elements.lang.onchange = updateLang;
        elements.play.onclick = () => { if(isPlaying) { isPlaying = false; clearTimeout(timeoutId); } typeWriter(elements.input.value || i18n[elements.lang.value].placeholder); };
        elements.save.onclick = () => { if(isPlaying) { isPlaying = false; clearTimeout(timeoutId); } typeWriter(elements.input.value || i18n[elements.lang.value].placeholder, true); };
        
        elements.speedNum.value = elements.speed.value;
        elements.pitchNum.value = elements.pitch.value;
        updateLang();
    </script>
</body>
</html>
